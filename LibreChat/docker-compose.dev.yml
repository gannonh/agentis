version: '3.8'

# Docker network and volumes names start with the project directory name
# To make them more identifiable, we specify a custom project name
name: agentis

services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: agentis-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    command: ["--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentis_network

  meilisearch:
    container_name: agentis-meilisearch
    image: getmeili/meilisearch:v1.12.3
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-DrhYf7zENyR6AlUCKmnz0eYASOQdl6zxH7s7MKFSfFCt}
    volumes:
      - meili_data:/meili_data
    networks:
      - agentis_network
      
  db:
    container_name: agentis-vectordb
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agentis_network
      
  rag_api:
    container_name: agentis-rag-api
    image: ghcr.io/gannonh/rag-api-lite:latest
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=mydatabase
      - RAG_PORT=8000
      - EMBEDDINGS_PROVIDER=openai
      - EMBEDDINGS_MODEL=text-embedding-3-small
    depends_on:
      - db
    networks:
      - agentis_network
      
  sandpack:
    container_name: agentis-sandpack
    image: ghcr.io/gannonh/codesandbox-client/bundler:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - agentis_network

  mailhog:
    container_name: agentis-mailhog
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - agentis_network

networks:
  agentis_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  meili_data:
    driver: local
  pgdata:
    driver: local
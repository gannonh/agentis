name: Bug report
description: Report a problem with Agentis
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm dev`
        2. Navigate to ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Node / pnpm version
      placeholder: Node 24, pnpm 9.15.9
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
    validations:
      required: false

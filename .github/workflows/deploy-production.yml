name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      repo-name: ${{ steps.repo.outputs.name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Convert repository name to lowercase
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./LibreChat
          file: ./LibreChat/Dockerfile.multi
          target: api-build
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./LibreChat
          file: ./LibreChat/Dockerfile.multi
          target: client-build
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          script: |
            cd /home/agentis/agentis/LibreChat
            
            # Pull latest images
            docker pull ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.repo-name }}/api:latest
            docker pull ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.repo-name }}/client:latest
            
            # Update docker-compose to use new images
            export API_IMAGE=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.repo-name }}/api:latest
            export CLIENT_IMAGE=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.repo-name }}/client:latest
            
            # Stop existing containers
            docker compose -f docker-compose.prod.yml down
            
            # Start with new images
            docker compose -f docker-compose.prod.yml up -d
            
            # Check health
            sleep 30
            docker compose -f docker-compose.prod.yml ps
            
            # Clean up old images
            docker image prune -f